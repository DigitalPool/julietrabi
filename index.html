<style>
  #wf-loader {
    position: fixed;
    inset: 0;
    z-index: 99999;
    pointer-events: none;
  }

  #wf-loader .wf-bg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  #wf-loader svg.wf-mask {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }
 
  #wf-loader.wf-done {
    opacity: 0;
    transition: opacity 0.9s ease;
  }
</style>
 
<script>
(function () {

  var USE_VIDEO  = true;
  var VIDEO_URL  = '/video-bgd.mov';  
  var IMAGE_URL  = '/image-bgd.png';
 
  var loader = document.createElement('div');
  loader.id  = 'wf-loader';
 
  var media;
  if (USE_VIDEO) {
    media = document.createElement('video');
    media.src         = VIDEO_URL;
    media.autoplay    = true;
    media.muted       = true;
    media.loop        = true;
    media.playsInline = true;
  } else {
    media = document.createElement('img');
    media.src = IMAGE_URL;
    media.alt = '';
  }
  media.className = 'wf-bg';
  loader.appendChild(media);
 
  var NS  = 'http://www.w3.org/2000/svg';
 
  var svg = document.createElementNS(NS, 'svg');
  svg.setAttribute('xmlns', NS);
  svg.classList.add('wf-mask');
  svg.setAttribute('preserveAspectRatio', 'none');
 
  var defs = document.createElementNS(NS, 'defs');
  var mask = document.createElementNS(NS, 'mask');
  mask.setAttribute('id', 'wf-pill-mask');
 
  var whiteRect = document.createElementNS(NS, 'rect');
  whiteRect.setAttribute('id', 'wf-white');
  whiteRect.setAttribute('x', '0');
  whiteRect.setAttribute('y', '0');
  whiteRect.setAttribute('width', '100%');
  whiteRect.setAttribute('height', '100%');
  whiteRect.setAttribute('fill', 'white');
 
  /* Two black pills = punch holes in the mask (hide overlay there → reveal bg) */
  var pillTop = document.createElementNS(NS, 'rect');
  pillTop.setAttribute('id', 'wf-pill-top');
  pillTop.setAttribute('fill', 'black');
 
  var pillBot = document.createElementNS(NS, 'rect');
  pillBot.setAttribute('id', 'wf-pill-bot');
  pillBot.setAttribute('fill', 'black');
 
  mask.appendChild(whiteRect);
  mask.appendChild(pillTop);
  mask.appendChild(pillBot);
  defs.appendChild(mask);
  svg.appendChild(defs);
 
  var overlay = document.createElementNS(NS, 'rect');
  overlay.setAttribute('x', '0');
  overlay.setAttribute('y', '0');
  overlay.setAttribute('width', '100%');
  overlay.setAttribute('height', '100%');
  // overlay.setAttribute('fill', '#1a1a1a');
  overlay.setAttribute('fill', '#28262e');
  overlay.setAttribute('mask', 'url(#wf-pill-mask)');
 
  svg.appendChild(overlay);
  loader.appendChild(svg);
 
  document.addEventListener('DOMContentLoaded', function () {
    document.body.insertBefore(loader, document.body.firstChild);
 
    var VW = window.innerWidth;
    var VH = window.innerHeight;
 
    var GAP      = VW * 0.04;           
    var PW       = VW * 0.36;          
    var PH       = VH * 50;           
    var RX       = PW * 0.5;            
    var totalW   = PW * 2 + GAP;
    var startX1  = (VW - totalW) / 2;   
    var startX2  = startX1 + PW + GAP;  
 
    var topY_start  = -PH;              
    var botY_start  = VH;               
 
    var topY_end    = VH;               
    var botY_end    = -PH;              
 
    function setPill(el, x, y) {
      el.setAttribute('x',      x);
      el.setAttribute('y',      y);
      el.setAttribute('width',  PW);
      el.setAttribute('height', PH);
      el.setAttribute('rx',     RX);
      el.setAttribute('ry',     RX);
    }
 
    setPill(pillTop, startX1, topY_start);
    setPill(pillBot, startX2, botY_start);
 
    function easeInOut(t) {
      return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2,3)/2;
    }
 
    var DURATION  = 2000;  
    var HOLD      = 400;   
    var startTime = null;
 
    function animatePills(ts) {
      if (!startTime) startTime = ts;
      var elapsed = ts - startTime;
      var t = Math.min(elapsed / DURATION, 1);
      var e = easeInOut(t);
 
      var topY = topY_start + (topY_end - topY_start) * e;
      var botY = botY_start + (botY_end - botY_start) * e;
 
      pillTop.setAttribute('y', topY);
      pillBot.setAttribute('y', botY);
 
      if (t < 1) {
        requestAnimationFrame(animatePills);
      } else {
        setTimeout(function () {
          loader.classList.add('wf-done');
          loader.addEventListener('transitionend', function () {
            loader.style.display = 'none';
          }, { once: true });
        }, 200);
      }
    }
 
    setTimeout(function () {
      requestAnimationFrame(animatePills);
    }, HOLD);
 
  });
 
})();
</script>
