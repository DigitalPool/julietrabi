<!--
  ══════════════════════════════════════════════════════
  WEBFLOW LOADER — Paste into: Pages → Homepage → Head Code
  ══════════════════════════════════════════════════════
  INSTRUCTIONS:
  1. Upload your background image/video to Webflow Assets.
  2. Replace VIDEO_URL or IMAGE_URL below with the asset URL.
  3. Set USE_VIDEO = true for video, false for image.
  4. Paste everything into Homepage → Custom Code → Head.
  ══════════════════════════════════════════════════════
-->
 
<style>
  #wf-loader {
    position: fixed;
    inset: 0;
    z-index: 99999;
    pointer-events: none;
  }
 
  /* Full-screen background media — always visible underneath */
  #wf-loader .wf-bg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
 
  /* SVG overlay — dark layer with animated pill holes cut out */
  #wf-loader svg.wf-mask {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }
 
  /* Loader fade-out */
  #wf-loader.wf-done {
    opacity: 0;
    transition: opacity 0.9s ease;
  }
</style>
 
<script>
(function () {
 
  /* ══════════════════════════════════
     CONFIG — edit these three lines
  ══════════════════════════════════ */
  var USE_VIDEO  = true;
  var VIDEO_URL  = '/video-bgd.mov';   // ← your Webflow asset URL
  var IMAGE_URL  = '/image-bgd.png';   // ← your Webflow asset URL
  /* ══════════════════════════════════ */
 
  /* ── Build loader shell ── */
  var loader = document.createElement('div');
  loader.id  = 'wf-loader';
 
  /* ── Background media ── */
  var media;
  if (USE_VIDEO) {
    media = document.createElement('video');
    media.src         = VIDEO_URL;
    media.autoplay    = true;
    media.muted       = true;
    media.loop        = true;
    media.playsInline = true;
  } else {
    media = document.createElement('img');
    media.src = IMAGE_URL;
    media.alt = '';
  }
  media.className = 'wf-bg';
  loader.appendChild(media);
 
  /* ── SVG mask overlay ── */
  var NS  = 'http://www.w3.org/2000/svg';
 
  var svg = document.createElementNS(NS, 'svg');
  svg.setAttribute('xmlns', NS);
  svg.classList.add('wf-mask');
  svg.setAttribute('preserveAspectRatio', 'none');
 
  /* defs → mask */
  var defs = document.createElementNS(NS, 'defs');
  var mask = document.createElementNS(NS, 'mask');
  mask.setAttribute('id', 'wf-pill-mask');
 
  /* White rect = show everything by default */
  var whiteRect = document.createElementNS(NS, 'rect');
  whiteRect.setAttribute('id', 'wf-white');
  whiteRect.setAttribute('x', '0');
  whiteRect.setAttribute('y', '0');
  whiteRect.setAttribute('width', '100%');
  whiteRect.setAttribute('height', '100%');
  whiteRect.setAttribute('fill', 'white');
 
  /* Two black pills = punch holes in the mask (hide overlay there → reveal bg) */
  var pillTop = document.createElementNS(NS, 'rect');
  pillTop.setAttribute('id', 'wf-pill-top');
  pillTop.setAttribute('fill', 'black');
 
  var pillBot = document.createElementNS(NS, 'rect');
  pillBot.setAttribute('id', 'wf-pill-bot');
  pillBot.setAttribute('fill', 'black');
 
  mask.appendChild(whiteRect);
  mask.appendChild(pillTop);
  mask.appendChild(pillBot);
  defs.appendChild(mask);
  svg.appendChild(defs);
 
  /* Dark overlay rect that uses the mask */
  var overlay = document.createElementNS(NS, 'rect');
  overlay.setAttribute('x', '0');
  overlay.setAttribute('y', '0');
  overlay.setAttribute('width', '100%');
  overlay.setAttribute('height', '100%');
  overlay.setAttribute('fill', '#1a1a1a');   /* ← overlay colour */
  overlay.setAttribute('mask', 'url(#wf-pill-mask)');
 
  svg.appendChild(overlay);
  loader.appendChild(svg);
 
  /* ── Inject into DOM ── */
  document.addEventListener('DOMContentLoaded', function () {
    document.body.insertBefore(loader, document.body.firstChild);
 
    var VW = window.innerWidth;
    var VH = window.innerHeight;
 
    /* ─── Pill geometry ───
       Two pills side by side, each ~38% of viewport width,
       centred together, with a small gap between them.
       Height is tall enough to be "pill" shaped (taller than wide).
       rx = half the width → rounded ends.
    */
    var GAP      = VW * 0.04;           // gap between pills
    var PW       = VW * 0.36;           // pill width
    var PH       = VH * 50;           // pill height
    var RX       = PW * 0.5;            // border-radius (full round ends)
    var totalW   = PW * 2 + GAP;
    var startX1  = (VW - totalW) / 2;   // left pill x
    var startX2  = startX1 + PW + GAP;  // right pill x
 
    /* Pills start OFF-SCREEN: top pill above viewport, bottom pill below */
    var topY_start  = -PH;              // top pill: above screen
    var botY_start  = VH;               // bottom pill: below screen
 
    /* Pills travel THROUGH each other to the opposite side */
    var topY_end    = VH;               // top pill exits bottom
    var botY_end    = -PH;              // bottom pill exits top
 
    function setPill(el, x, y) {
      el.setAttribute('x',      x);
      el.setAttribute('y',      y);
      el.setAttribute('width',  PW);
      el.setAttribute('height', PH);
      el.setAttribute('rx',     RX);
      el.setAttribute('ry',     RX);
    }
 
    /* ── Phase 0: set initial positions ── */
    setPill(pillTop, startX1, topY_start);
    setPill(pillBot, startX2, botY_start);
 
    /* ── Easing helper (ease-in-out cubic) ── */
    function easeInOut(t) {
      return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2,3)/2;
    }
 
    /* ── Animate pills from start → end ── */
    var DURATION  = 2000;   // ms for pills to travel through
    var HOLD      = 400;    // ms before animation starts
    var startTime = null;
 
    function animatePills(ts) {
      if (!startTime) startTime = ts;
      var elapsed = ts - startTime;
      var t = Math.min(elapsed / DURATION, 1);
      var e = easeInOut(t);
 
      var topY = topY_start + (topY_end - topY_start) * e;
      var botY = botY_start + (botY_end - botY_start) * e;
 
      pillTop.setAttribute('y', topY);
      pillBot.setAttribute('y', botY);
 
      if (t < 1) {
        requestAnimationFrame(animatePills);
      } else {
        /* Pills have exited — fade out entire loader */
        setTimeout(function () {
          loader.classList.add('wf-done');
          loader.addEventListener('transitionend', function () {
            loader.style.display = 'none';
          }, { once: true });
        }, 200);
      }
    }
 
    setTimeout(function () {
      requestAnimationFrame(animatePills);
    }, HOLD);
 
  }); // DOMContentLoaded
 
})();
</script>
