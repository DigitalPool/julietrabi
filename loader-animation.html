<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Loader</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Georgia', serif;
    background: #0a0a0a;
    overflow: hidden;
  }

  /* ─── LOADER WRAPPER ─── */
  #loader {
    position: fixed;
    inset: 0;
    z-index: 9999;
    pointer-events: none;
  }

  /* Dark overlay panels */
  .panel {
    position: absolute;
    left: 0;
    width: 100%;
    height: 50%;
    background: #0a0a0a;
    z-index: 2;
    transition: transform 1.2s cubic-bezier(0.76, 0, 0.24, 1);
  }
  .panel-top    { top: 0;   transform-origin: top; }
  .panel-bottom { bottom: 0; transform-origin: bottom; }

  /* The "window" clip that travels between the two panels */
  .reveal-window {
    position: absolute;
    left: 0;
    width: 100%;
    z-index: 1;
    overflow: hidden;
    transition: top 1.2s cubic-bezier(0.76, 0, 0.24, 1),
                height 1.2s cubic-bezier(0.76, 0, 0.24, 1);
  }

  /* Background image lives inside the window */
  .reveal-window img {
    position: absolute;
    top: 0; left: 0;
    width: 100vw;
    height: 100vh;
    object-fit: cover;
    display: block;
  }

  /* Thin accent lines on panel edges */
  .panel-top::after,
  .panel-bottom::before {
    content: '';
    position: absolute;
    left: 0;
    width: 100%;
    height: 1px;
    background: rgba(255,255,255,0.25);
  }
  .panel-top::after    { bottom: 0; }
  .panel-bottom::before { top: 0; }

  /* Loader fade-out */
  #loader.done {
    opacity: 0;
    transition: opacity 0.8s ease 0.2s;
  }

  /* ─── HOMEPAGE ─── */
  #homepage {
    position: relative;
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  #homepage img.bg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  #homepage .overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.45);
  }
  #homepage .content {
    position: relative;
    text-align: center;
    color: #fff;
    opacity: 0;
    transform: translateY(18px);
    transition: opacity 0.9s ease 0.4s, transform 0.9s ease 0.4s;
  }
  #homepage .content.visible {
    opacity: 1;
    transform: translateY(0);
  }
  #homepage h1 {
    font-size: clamp(2rem, 5vw, 4rem);
    font-weight: 300;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-bottom: 1rem;
  }
  #homepage p {
    font-size: 1rem;
    letter-spacing: 0.12em;
    opacity: 0.7;
    font-style: italic;
  }
</style>
</head>
<body>

<!-- ═══════════════ LOADER ═══════════════ -->
<div id="loader">
  <!-- Top dark panel -->
  <div class="panel panel-top" id="panelTop"></div>

  <!-- Sliding window that reveals background -->
  <div class="reveal-window" id="revealWindow">
    <img src="image-bgd.png" alt="" id="windowImg" />
  </div>

  <!-- Bottom dark panel -->
  <div class="panel panel-bottom" id="panelBottom"></div>
</div>

<!-- ═══════════════ HOMEPAGE ═══════════════ -->
<div id="homepage">
  <img class="bg" src="image-bgd.png" alt="Background" />
  <div class="overlay"></div>
  <div class="content" id="homeContent">
    <h1>Welcome</h1>
    <p>Experience the moment</p>
  </div>
</div>

<script>
  /*
   * LOADER LOGIC
   * ─────────────────────────────────────────────────────────────────
   * Phase 1 (0 → 600ms)   : initial hold — let page resources settle
   * Phase 2 (600ms)        : window starts narrow at 50vh, panels part
   * Phase 3 (~1800ms)      : window fills full viewport, panels gone
   * Phase 4 (~1900ms)      : loader fades out, homepage content rises
   */

  const loader      = document.getElementById('loader');
  const panelTop    = document.getElementById('panelTop');
  const panelBottom = document.getElementById('panelBottom');
  const revWin      = document.getElementById('revealWindow');
  const winImg      = document.getElementById('windowImg');
  const homeContent = document.getElementById('homeContent');

  const VH = window.innerHeight;

  /* ── Initial state: window = 0px tall, centred ── */
  function setWindow(topPx, heightPx) {
    revWin.style.top    = topPx + 'px';
    revWin.style.height = heightPx + 'px';
    winImg.style.top    = -topPx + 'px';   /* keep bg locked to viewport */
  }

  /* Start collapsed at mid-screen */
  revWin.style.transition = 'none';
  setWindow(VH / 2, 0);

  /* Phase 2 — expand window to full height */
  setTimeout(() => {
    revWin.style.transition =
      'top 1.2s cubic-bezier(0.76,0,0.24,1), height 1.2s cubic-bezier(0.76,0,0.24,1)';
    setWindow(0, VH);

    panelTop.style.transform    = 'translateY(-100%)';
    panelBottom.style.transform = 'translateY(100%)';
  }, 600);

  /* Phase 4 — fade loader, reveal content */
  setTimeout(() => {
    loader.classList.add('done');
    loader.addEventListener('transitionend', () => {
      loader.style.display = 'none';
    }, { once: true });
    homeContent.classList.add('visible');
  }, 2000);
</script>

</body>
</html>
